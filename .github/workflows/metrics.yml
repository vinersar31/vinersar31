name: Metrics

on:
  # Update daily at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Refresh whenever the workflow or README changes
  push:
    branches:
      - main
      - master

# The action needs write access to commit the generated SVG
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal access token stored as a repo secret (see README setup notes)
          token: ${{ secrets.METRICS_TOKEN }}

          # Account to generate metrics for
          user: vinersar31

          # Output file (this is what the README references)
          filename: github-metrics.svg

          # Overall look
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London

          # Languages breakdown across your repositories
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_limit: 8

          # 3D contribution calendar for the full year
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
